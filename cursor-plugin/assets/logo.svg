<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Substrait">
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D5BF6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- background plate -->
  <rect width="512" height="512" rx="112" fill="url(#plate)"/>
  <!-- stacked strata: bottom (faint) -> top (solid), reads as platform layers -->
  <g fill="#FFFFFF">
    <path d="M256 270 L396 342 L256 414 L116 342 Z" opacity="0.45"/>
    <path d="M256 184 L396 256 L256 328 L116 256 Z" opacity="0.70"/>
    <path d="M256 98 L396 170 L256 242 L116 170 Z" opacity="1"/>
  </g>
</svg>
